<!DOCTYPE html>
<html>
<head>
<title>Ty1erMC Coinflip</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:400px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
font-size:16px;
}

button{
width:95%;
padding:12px;
margin-top:10px;
background:#22c55e;
border:none;
border-radius:6px;
font-size:18px;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:6px;
display:none;
}

.copy{
margin-top:10px;
background:#3b82f6;
}

.copy:hover{
background:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<h1>Deposit</h1>

<input id="username" placeholder="Minecraft Username">

<input id="amount" type="number" placeholder="Deposit Amount">

<button onclick="generate()">Generate Deposit</button>

<div id="result">

<p>Run this command in Minecraft:</p>

<b id="command"></b>

<button class="copy" onclick="copyCommand()">Copy Command</button>

</div>

</div>

<script>

function generate(){

const username = document.getElementById("username").value
const amount = document.getElementById("amount").value

if(!username || !amount){
alert("Enter username and amount")
return
}

const command = `/pay Ty1erMC ${amount}`

document.getElementById("command").innerText = command
document.getElementById("result").style.display = "block"

}

function copyCommand(){

const text = document.getElementById("command").innerText

navigator.clipboard.writeText(text)

alert("Command copied!")

}

</script>

</body>
</html>
