<!DOCTYPE html>

<html>
<head>
<title>DonutCF</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding-top:60px;
}

h1{
font-size:60px;
background:linear-gradient(45deg,#dc2626,#facc15);
-webkit-background-clip:text;
color:transparent;
}

.box{
background:#111;
border:1px solid #333;
padding:30px;
width:350px;
margin:auto;
border-radius:15px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
background:#222;
color:white;
}

button{
background:linear-gradient(45deg,#b91c1c,#facc15);
border:none;
padding:12px 25px;
border-radius:25px;
color:white;
cursor:pointer;
margin:5px;
}

button:hover{
transform:scale(1.05);
}

.command{
background:#000;
padding:10px;
margin-top:10px;
border-radius:10px;
display:none;
}

.coin{
font-size:40px;
margin:20px;
}

</style>

</head>

<body>

<h1>DonutCF</h1>

<div class="box">

<input id="username" placeholder="Minecraft Username">

<button onclick="checkBalance()">Check Balance</button>

<p>Balance: $<span id="balance">0</span></p>

<hr>

<h3>Deposit</h3>

<input id="depositAmount" placeholder="Amount">

<button onclick="generateDeposit()">Generate Command</button>

<div class="command" id="commandBox">
Type this in Minecraft:<br>
<b id="commandText"></b>
</div>

<hr>

<h3>Coinflip</h3>

<input id="betAmount" placeholder="Bet Amount">

<button onclick="coinflip()">Flip Coin</button>

<div class="coin" id="coin">?</div>

<p id="result"></p>

</div>

<script>

/* CHECK BALANCE */

async function checkBalance(){

const user=document.getElementById("username").value

if(!user){
alert("Enter username")
return
}

const res=await fetch("http://localhost:3000/balance/"+user)
const data=await res.json()

document.getElementById("balance").innerText=data.balance

}

/* GENERATE DEPOSIT COMMAND */

function generateDeposit(){

const amount=document.getElementById("depositAmount").value

if(!amount){
alert("Enter amount")
return
}

const cmd="/pay Ty1erMC "+amount

document.getElementById("commandText").innerText=cmd
document.getElementById("commandBox").style.display="block"

}

/* COINFLIP */

async function coinflip(){

const user=document.getElementById("username").value
const amount=document.getElementById("betAmount").value

if(!user||!amount){
alert("Enter username and bet")
return
}

const res=await fetch("http://localhost:3000/coinflip",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user:user,
amount:amount
})
})

const data=await res.json()

if(data.error){
alert(data.error)
return
}

const coin=document.getElementById("coin")

if(data.result==="win"){
coin.innerText="HEADS"
document.getElementById("result").innerText="YOU WON!"
}else{
coin.innerText="TAILS"
document.getElementById("result").innerText="YOU LOST!"
}

document.getElementById("balance").innerText=data.balance

}

</script>

</body>
</html>
