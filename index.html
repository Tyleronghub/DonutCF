<!DOCTYPE html>

<html>
<head>
<title>DonutCF</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow-x:hidden;
}

/* PARTICLE BACKGROUND */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
right:0;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:5;
}

.logo{
font-size:22px;
font-weight:bold;
color:#facc15;
}

.nav-right{
display:flex;
gap:12px;
align-items:center;
}

.balance{
background:#111;
padding:8px 16px;
border-radius:20px;
border:1px solid #333;
}

button{
background:linear-gradient(45deg,#b91c1c,#facc15);
border:none;
padding:10px 20px;
border-radius:30px;
color:white;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 15px rgba(250,204,21,0.6);
}

/* TITLE */

.center{
margin-top:140px;
text-align:center;
position:relative;
z-index:2;
}

h1{
font-size:80px;
margin:0;
background:linear-gradient(45deg,#dc2626,#facc15);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
opacity:.7;
}

/* GAME CIRCLES */

.games{
margin-top:80px;
display:flex;
justify-content:center;
gap:50px;
flex-wrap:wrap;
}

.game{
width:140px;
height:140px;
border-radius:50%;
background:#111;
border:2px solid #222;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
cursor:pointer;
transition:.25s;
}

.game span{
color:#facc15;
font-weight:bold;
}

.game:hover{
transform:scale(1.1);
border:2px solid #facc15;
box-shadow:0 0 25px rgba(250,204,21,0.6);
}

/* DEPOSIT MODAL */

.modal-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:10;
}

.modal{
background:#111;
padding:40px;
border-radius:20px;
text-align:center;
width:320px;
transform:scale(.8);
transition:.3s;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:25px;
background:#222;
color:white;
}

.command{
background:#000;
padding:10px;
border-radius:10px;
margin-top:10px;
display:none;
}

.modal-bg.active{
opacity:1;
pointer-events:auto;
}

.modal-bg.active .modal{
transform:scale(1);
}

/* COINFLIP PAGE */

.coinflip-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:20;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

.coin{
width:160px;
height:160px;
border-radius:50%;
background:linear-gradient(45deg,#b91c1c,#facc15);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
margin:30px auto;
transition:transform 1s;
}

.flip{
transform:rotateY(720deg);
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="navbar">

<div class="logo">DonutCF</div>

<div class="nav-right">

<div class="balance">Balance: <span id="bal">0</span></div>

<button onclick="openDeposit()">Deposit</button>

</div>

</div>

<div class="center">


<div class="games">

<div class="game" onclick="openCoinflip()">
<span>Coinflip</span>
</div>

<div class="game"><span>?</span></div>
<div class="game"><span>?</span></div>
<div class="game"><span>?</span></div>
<div class="game"><span>?</span></div>

</div>

</div>

<!-- DEPOSIT -->

<div class="modal-bg" id="depositModal">

<div class="modal">

<h2>Deposit</h2>

<input id="username" placeholder="Minecraft Username">
<input id="amount" type="number" placeholder="Amount">

<button onclick="generate()">Generate Command</button>

<div class="command" id="commandBox">
<b id="command"></b>
</div>

</div>

</div>

<!-- COINFLIP -->

<div class="coinflip-screen" id="coinflipScreen">

<div class="close" onclick="closeCoinflip()">✕</div>

<div style="text-align:center;margin-top:120px">

<h2>Coinflip</h2>

<div class="coin" id="coin">?</div>

<button onclick="flip()">Flip</button>

<p id="result"></p>

</div>

</div>

<script>

/* MODAL */

function openDeposit(){
document.getElementById("depositModal").classList.add("active")
}

window.onclick=function(e){
if(e.target.id==="depositModal"){
document.getElementById("depositModal").classList.remove("active")
}
}

/* GENERATE COMMAND */

function generate(){

const user = document.getElementById("username").value
const amount = document.getElementById("amount").value

if(!user || !amount){
alert("Enter username and amount")
return
}

const cmd = `/pay Ty1erMC ${amount}`

document.getElementById("command").innerText = cmd
document.getElementById("commandBox").style.display = "block"

}

/* COINFLIP */

function openCoinflip(){
document.getElementById("coinflipScreen").style.display="block"
}

function closeCoinflip(){
document.getElementById("coinflipScreen").style.display="none"
}

function flip(){

const coin = document.getElementById("coin")

coin.classList.add("flip")

setTimeout(()=>{

coin.classList.remove("flip")

let win = Math.random() < 0.5

coin.innerText = win ? "HEADS" : "TAILS"

document.getElementById("result").innerText = win ? "You Win" : "You Lose"

},1000)

}

/* PARTICLES */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*.4,
dy:(Math.random()-.5)*.4,
color:Math.random()<.5?"#dc2626":"#facc15"
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>canvas.width)p.dx*=-1
if(p.y<0||p.y>canvas.height)p.dy*=-1

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
