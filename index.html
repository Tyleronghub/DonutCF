<!DOCTYPE html>

<html>
<head>
<title>DonutCF</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow-x:hidden;
}

/* PARTICLE BACKGROUND */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
right:0;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:5;
}

.logo{
font-size:22px;
font-weight:bold;
color:#facc15;
}

.nav-right{
display:flex;
align-items:center;
gap:12px;
}

.balance{
background:#111;
padding:8px 16px;
border-radius:20px;
border:1px solid #333;
}

button{
background:linear-gradient(45deg,#b91c1c,#facc15);
border:none;
padding:10px 20px;
border-radius:30px;
color:white;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 15px rgba(250,204,21,0.6);
}

/* HERO */

.center{
margin-top:140px;
text-align:center;
position:relative;
z-index:2;
}

h1{
font-size:80px;
margin:0;
background:linear-gradient(45deg,#dc2626,#facc15);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
opacity:.7;
}

/* GAME CARDS */

.cards{
margin-top:70px;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
width:220px;
height:150px;
background:#111;
border-radius:20px;
border:1px solid #222;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.25s;
}

.card h2{
color:#facc15;
margin:0;
}

.card p{
opacity:.6;
font-size:14px;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
border:1px solid #facc15;
box-shadow:0 0 20px rgba(250,204,21,0.6);
}

/* DEPOSIT MODAL */

.modal-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:10;
}

.modal{
background:#111;
padding:40px;
border-radius:20px;
text-align:center;
width:340px;
transform:scale(.8);
transition:.3s;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:25px;
background:#222;
color:white;
}

.command{
background:#000;
padding:12px;
border-radius:12px;
margin-top:10px;
display:none;
}

.modal-bg.active{
opacity:1;
pointer-events:auto;
}

.modal-bg.active .modal{
transform:scale(1);
}

/* COINFLIP SCREEN */

.coinflip-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:20;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* COIN */

.coin{
width:160px;
height:160px;
border-radius:50%;
background:linear-gradient(45deg,#b91c1c,#facc15);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
margin:30px auto;
transition:transform 1s;
}

.flip{
transform:rotateY(720deg);
}

/* PANELS */

.panels{
display:flex;
justify-content:center;
gap:40px;
margin-top:30px;
}

.panel{
background:#111;
border:1px solid #222;
border-radius:15px;
padding:20px;
width:250px;
height:250px;
overflow:auto;
}

.panel h3{
margin-top:0;
color:#facc15;
}

/* FEED */

.feed-item{
padding:6px 0;
border-bottom:1px solid #222;
font-size:14px;
}

/* TICKER */

.ticker{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:10px 0;
overflow:hidden;
border-top:1px solid #222;
z-index:5;
}

.ticker-track{
display:inline-block;
white-space:nowrap;
animation:ticker 25s linear infinite;
}

.ticker span{
margin-right:60px;
color:#facc15;
}

@keyframes ticker{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="navbar">

<div class="logo">DonutCF</div>

<div class="nav-right">

<div class="balance">Balance: <span id="bal">0</span></div>

<button onclick="openDeposit()">Deposit</button> <button onclick="openCoinflip()">Coinflip</button>

</div>

</div>

<div class="center">

<h1>DonutCF</h1>
<p class="subtitle">Red • Gold • Coinflip</p>

<div class="cards">

<div class="card" onclick="openCoinflip()">
<h2>Coinflip</h2>
<p>Heads or Tails</p>
</div>

<div class="card">
<h2>Jackpot</h2>
<p>Coming Soon</p>
</div>

<div class="card">
<h2>Roulette</h2>
<p>Coming Soon</p>
</div>

<div class="card">
<h2>Crash</h2>
<p>Coming Soon</p>
</div>

<div class="card">
<h2>Case Open</h2>
<p>Coming Soon</p>
</div>

</div>

</div>

<!-- DEPOSIT -->

<div class="modal-bg" id="depositModal">

<div class="modal">

<h2>Deposit</h2>

<input id="username" placeholder="Minecraft Username">
<input id="amount" type="number" placeholder="Amount">

<button onclick="generate()">Generate Command</button>

<div class="command" id="commandBox">
<b id="command"></b>
</div>

</div>

</div>

<!-- COINFLIP PAGE -->

<div class="coinflip-screen" id="coinflipScreen">

<div class="close" onclick="closeCoinflip()">✕</div>

<div style="text-align:center;margin-top:100px">

<h2>Coinflip</h2>

<div class="coin" id="coin">?</div>

<button onclick="flip()">Flip</button>

<p id="result"></p>

<div class="panels">

<div class="panel">
<h3>Recent Flips</h3>
<div id="recent"></div>
</div>

<div class="panel">
<h3>Active Battles</h3>
<div id="battles"></div>
</div>

</div>

</div>

</div>

<div class="ticker">
<div class="ticker-track">
<span>Steve won 500k</span>
<span>Alex lost 200k</span>
<span>Dream won 1M</span>
<span>Notch lost 750k</span>
<span>Player123 won 300k</span>
</div>
</div>

<script>

/* BALANCE */

let balance=0
function updateBalance(){
document.getElementById("bal").innerText=balance
}

/* MODALS */

function openDeposit(){
depositModal.classList.add("active")
}

window.onclick=function(e){
if(e.target.id==="depositModal"){
depositModal.classList.remove("active")
}
}

/* GENERATE COMMAND */

function generate(){

let user=username.value
let amount=amount.value

if(!user||!amount){
alert("Enter username and amount")
return
}

let cmd=`/pay Ty1erMC ${amount}`

command.innerText=cmd
commandBox.style.display="block"

}

/* COINFLIP */

function openCoinflip(){
coinflipScreen.style.display="block"
}

function closeCoinflip(){
coinflipScreen.style.display="none"
}

function flip(){

coin.classList.add("flip")

setTimeout(()=>{

coin.classList.remove("flip")

let win=Math.random()<0.5
let result=win?"HEADS":"TAILS"

coin.innerText=result

addRecent(result,win)

},1000)

}

/* RECENT FEED */

function addRecent(side,win){

let div=document.createElement("div")

div.className="feed-item"

div.innerText=`You flipped ${side} - ${win?"WIN":"LOSE"}`

recent.prepend(div)

}

/* DEMO BATTLES */

let demo=["Steve vs Alex","Dream vs Notch","Player1 vs Player2"]

demo.forEach(b=>{
let d=document.createElement("div")
d.className="feed-item"
d.innerText=b
battles.appendChild(d)
})

/* PARTICLES */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*.4,
dy:(Math.random()-.5)*.4,
color:Math.random()<.5?"#dc2626":"#facc15"
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>canvas.width)p.dx*=-1
if(p.y<0||p.y>canvas.height)p.dy*=-1

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
