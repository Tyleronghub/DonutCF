<!DOCTYPE html>

<html>
<head>
<title>DonutCF</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:420px;
background:#0f0f0f;
border-radius:20px;
padding:40px;
box-shadow:0 0 40px rgba(0,0,0,0.8);
text-align:center;
}

h1{
font-size:50px;
margin-bottom:5px;
background:linear-gradient(45deg,#dc2626,#facc15);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
opacity:.6;
margin-bottom:30px;
}

.section{
margin-top:30px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1a1a1a;
color:white;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#dc2626,#facc15);
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.03);
}

.balanceBox{
margin-top:15px;
background:#111;
padding:12px;
border-radius:10px;
}

.command{
background:#000;
padding:12px;
border-radius:10px;
margin-top:10px;
display:none;
}

.coin{
font-size:42px;
margin-top:20px;
}

.result{
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>DonutCF</h1>
<div class="subtitle">Red • Gold • Coinflip</div>

<input id="username" placeholder="Minecraft Username">

<div class="section">

<button onclick="checkBalance()">Check Balance</button>

<div class="balanceBox">
Balance: $<span id="balance">0</span>
</div>

</div>

<div class="section">

<h3>Deposit</h3>

<input id="depositAmount" placeholder="Amount">

<button onclick="generateDeposit()">Generate Deposit Command</button>

<div class="command" id="commandBox">
Type this in Minecraft:<br>
<b id="commandText"></b>
</div>

</div>

<div class="section">

<h3>Coinflip</h3>

<input id="betAmount" placeholder="Bet Amount">

<button onclick="coinflip()">Flip Coin</button>

<div class="coin" id="coin">?</div>

<div class="result" id="result"></div>

</div>

</div>

<script>

/* CHECK BALANCE */

async function checkBalance(){

const user=document.getElementById("username").value

if(!user){
alert("Enter username")
return
}

try{

const res=await fetch("http://localhost:3000/balance/"+user)
const data=await res.json()

document.getElementById("balance").innerText=data.balance

}catch{

alert("Cannot connect to bot API. Make sure bot.js is running.")

}

}

/* GENERATE DEPOSIT */

function generateDeposit(){

const amount=document.getElementById("depositAmount").value

if(!amount){
alert("Enter deposit amount")
return
}

const cmd="/pay Ty1erMC "+amount

document.getElementById("commandText").innerText=cmd
document.getElementById("commandBox").style.display="block"

}

/* COINFLIP */

async function coinflip(){

const user=document.getElementById("username").value
const amount=document.getElementById("betAmount").value

if(!user||!amount){
alert("Enter username and bet")
return
}

const res=await fetch("http://localhost:3000/coinflip",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user:user,
amount:amount
})
})

const data=await res.json()

if(data.error){

document.getElementById("result").innerText="❌ You don't have enough money"
return

}

const coin=document.getElementById("coin")

if(data.result==="win"){

coin.innerText="HEADS"
document.getElementById("result").innerText="🎉 You Won!"

}else{

coin.innerText="TAILS"
document.getElementById("result").innerText="❌ You Lost"

}

document.getElementById("balance").innerText=data.balance

}

</script>

</body>
</html>
