<!DOCTYPE html>
<html>
<head>
<title>Deposit</title>

<style>
body{
font-family: Arial;
background:#121212;
color:white;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#command{
margin-top:30px;
font-size:20px;
color:#00ff88;
}
</style>

</head>

<body>

<h1>Minecraft Deposit</h1>

<p>Enter your username and deposit amount</p>

<input id="username" placeholder="Minecraft Username">

<br>

<input id="amount" type="number" placeholder="Amount">

<br>

<button onclick="generateDeposit()">Generate Deposit</button>

<div id="command"></div>

<script>

function generateDeposit(){

const username = document.getElementById("username").value
const amount = document.getElementById("amount").value

if(!username || !amount){
alert("Enter username and amount")
return
}

const command = `/pay Ty1erMC ${amount}`

document.getElementById("command").innerHTML =
`Run this command in Minecraft:<br><br><b>${command}</b>`

}

</script>

</body>
</html>
