<!DOCTYPE html>
<html>
<head>
<title>DonutCF</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
overflow:hidden;
}

/* Top bar */

.navbar{
position:absolute;
top:0;
left:0;
right:0;
padding:20px 40px;
display:flex;
justify-content:flex-end;
}

.navbar button{
background:#22c55e;
border:none;
padding:10px 20px;
border-radius:30px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.3s;
}

.navbar button:hover{
background:#16a34a;
transform:scale(1.05);
}

/* Center title */

.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

h1{
font-size:80px;
margin:0;
letter-spacing:3px;
}

.subtitle{
margin-top:10px;
opacity:0.6;
}

/* Modal background */

.modal-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

/* Modal box */

.modal{
background:#1e293b;
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
transform:scale(0.8);
transition:0.3s;
}

/* Inputs */

input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:25px;
font-size:16px;
}

/* Buttons */

.generate{
background:#22c55e;
border:none;
padding:12px;
width:95%;
border-radius:25px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.3s;
}

.generate:hover{
background:#16a34a;
}

/* Command box */

.command{
margin-top:15px;
background:#0f172a;
padding:15px;
border-radius:12px;
display:none;
}

/* Active modal */

.modal-bg.active{
opacity:1;
pointer-events:auto;
}

.modal-bg.active .modal{
transform:scale(1);
}

</style>
</head>

<body>

<div class="navbar">
<button onclick="openDeposit()">Deposit</button>
</div>

<div class="center">

<h1>DonutCF</h1>

<p class="subtitle">Coinflip Deposits</p>

</div>

<div class="modal-bg" id="depositModal">

<div class="modal">

<h2>Deposit</h2>

<input id="username" placeholder="Minecraft Username">

<input id="amount" type="number" placeholder="Amount">

<button class="generate" onclick="generate()">Generate Command</button>

<div class="command" id="commandBox">
<p>Run this in Minecraft:</p>
<b id="command"></b>
</div>

</div>

</div>

<script>

function openDeposit(){
document.getElementById("depositModal").classList.add("active")
}

function closeDeposit(){
document.getElementById("depositModal").classList.remove("active")
}

window.onclick = function(event){
const modal = document.getElementById("depositModal")
if(event.target == modal){
closeDeposit()
}
}

function generate(){

const username = document.getElementById("username").value
const amount = document.getElementById("amount").value

if(!username || !amount){
alert("Enter username and amount")
return
}

const cmd = `/pay Ty1erMC ${amount}`

document.getElementById("command").innerText = cmd
document.getElementById("commandBox").style.display = "block"

}

</script>

</body>
</html>
