<!DOCTYPE html>

<html>
<head>
<title>DonutCF</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* PARTICLES */

#particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
}

/* NAVBAR */

.navbar{
position:absolute;
top:0;
left:0;
right:0;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:2;
}

.logo{
font-weight:bold;
font-size:22px;
color:#facc15;
}

.nav-right{
display:flex;
gap:15px;
align-items:center;
}

.balance{
background:#111;
padding:8px 16px;
border-radius:20px;
border:1px solid #333;
}

button{
background:linear-gradient(45deg,#b91c1c,#facc15);
border:none;
padding:10px 22px;
border-radius:30px;
font-size:15px;
color:white;
cursor:pointer;
transition:.25s;
box-shadow:0 0 10px rgba(255,200,0,.2);
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 18px rgba(255,200,0,.6);
}

/* CENTER */

.center{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:1;
position:relative;
}

h1{
font-size:90px;
margin:0;
background:linear-gradient(45deg,#dc2626,#facc15);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
opacity:.7;
margin-top:10px;
}

/* MODAL */

.modal-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:5;
}

.modal{
background:#111;
padding:40px;
border-radius:20px;
width:360px;
text-align:center;
transform:scale(.8);
transition:.3s;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:25px;
font-size:16px;
background:#222;
color:white;
}

.command{
margin-top:15px;
background:#000;
padding:15px;
border-radius:12px;
display:none;
}

.modal-bg.active{
opacity:1;
pointer-events:auto;
}

.modal-bg.active .modal{
transform:scale(1);
}

/* COINFLIP SCREEN */

.coinflip-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:10;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* COIN */

.coin{
width:160px;
height:160px;
border-radius:50%;
background:linear-gradient(45deg,#b91c1c,#facc15);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
margin:30px auto;
transition:transform 1s;
}

.flip{
transform:rotateY(720deg);
}

/* PANELS */

.panels{
display:flex;
gap:40px;
justify-content:center;
margin-top:30px;
}

.panel{
background:#111;
padding:20px;
border-radius:15px;
width:250px;
height:250px;
overflow:auto;
border:1px solid #222;
}

.panel h3{
margin-top:0;
color:#facc15;
}

/* FEED */

.feed-item{
padding:6px 0;
border-bottom:1px solid #222;
font-size:14px;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="navbar">

<div class="logo">DonutCF</div>

<div class="nav-right">

<div class="balance">Balance: <span id="bal">0</span></div>

<button onclick="openDeposit()">Deposit</button>

<button onclick="openCoinflip()">Coinflip</button>

</div>

</div>

<div class="center">

<h1>DonutCF</h1>
<p class="subtitle">Red • Gold • Coinflip</p>

</div>

<!-- DEPOSIT -->

<div class="modal-bg" id="depositModal">

<div class="modal">

<h2>Deposit</h2>

<input id="username" placeholder="Minecraft Username">
<input id="amount" type="number" placeholder="Amount">

<button onclick="generate()">Generate Command</button>

<div class="command" id="commandBox">
<p>Run this command:</p>
<b id="command"></b>
</div>

</div>

</div>

<!-- COINFLIP PAGE -->

<div class="coinflip-screen" id="coinflipScreen">

<div class="close" onclick="closeCoinflip()">✕</div>

<div style="text-align:center;margin-top:80px">

<h2>Coinflip</h2>

<div class="coin" id="coin">?</div>

<button onclick="flip()">Flip</button>

<p id="result"></p>

<div class="panels">

<div class="panel">
<h3>Recent Flips</h3>
<div id="recent"></div>
</div>

<div class="panel">
<h3>Active Battles</h3>
<div id="battles"></div>
</div>

</div>

</div>

</div>

<script>

/* BALANCE */

let balance=0

function updateBalance(){
document.getElementById("bal").innerText=balance
}

updateBalance()

/* MODALS */

function openDeposit(){
document.getElementById("depositModal").classList.add("active")
}

window.onclick=function(e){
if(e.target.id==="depositModal"){
document.getElementById("depositModal").classList.remove("active")
}
}

/* GENERATE COMMAND */

function generate(){

let user=username.value
let amount=amount.value

if(!user||!amount){
alert("Enter username and amount")
return
}

let cmd=`/pay Ty1erMC ${amount}`

command.innerText=cmd
commandBox.style.display="block"

}

/* COINFLIP PAGE */

function openCoinflip(){
coinflipScreen.style.display="block"
}

function closeCoinflip(){
coinflipScreen.style.display="none"
}

/* COINFLIP */

function flip(){

if(balance<=0){
alert("No balance!")
return
}

coin.classList.add("flip")

setTimeout(()=>{

coin.classList.remove("flip")

let win=Math.random()<0.5

let result=win?"HEADS":"TAILS"

coin.innerText=result

if(win){
balance+=100
}else{
balance-=100
}

updateBalance()

addRecent(result,win)

},1000)

}

/* RECENT FEED */

function addRecent(side,win){

let div=document.createElement("div")

div.className="feed-item"

div.innerText=`You flipped ${side} - ${win?"WIN":"LOSE"}`

recent.prepend(div)

}

/* BATTLES DEMO */

let demoBattles=["Steve vs Alex","Dream vs Notch","Player1 vs Player2"]

demoBattles.forEach(b=>{

let div=document.createElement("div")

div.className="feed-item"

div.innerText=b

battles.appendChild(div)

})

/* PARTICLES */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*.4,
dy:(Math.random()-.5)*.4,
color:Math.random()<.5?"#dc2626":"#facc15"
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>canvas.width)p.dx*=-1
if(p.y<0||p.y>canvas.height)p.dy*=-1

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
